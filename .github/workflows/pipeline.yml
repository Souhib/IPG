name: Pipeline

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "front/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "front/**"
  workflow_dispatch:

concurrency:
  group: pipeline
  cancel-in-progress: false

env:
  DEPLOY_DIR: /etc/dokploy/compose/<REDACTED_DOKPLOY_ID>/code

jobs:
  # ── Detect which paths changed ──────────────────────────────

  changes:
    runs-on: self-hosted
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            DIFF=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
            echo "$DIFF" | grep -q '^backend/' && echo "backend=true" >> $GITHUB_OUTPUT || echo "backend=false" >> $GITHUB_OUTPUT
            echo "$DIFF" | grep -q '^front/' && echo "frontend=true" >> $GITHUB_OUTPUT || echo "frontend=false" >> $GITHUB_OUTPUT
          fi

  # ── Security Scan (Trivy) ───────────────────────────────────

  security-scan:
    runs-on: self-hosted
    needs: changes
    if: (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true') && github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 0
          format: table

  # ── Backend CI ──────────────────────────────────────────────

  backend:
    runs-on: self-hosted
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Lint (ruff check)
        run: uv run ruff check ipg/ tests/

      - name: Format check (ruff format)
        run: uv run ruff format --check ipg/ tests/

      - name: Test (pytest with PostgreSQL)
        run: uv run pytest --use-postgres --tb=short -q --no-cov

  # ── Frontend CI ─────────────────────────────────────────────

  frontend:
    runs-on: self-hosted
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (oxlint)
        run: bun run lint

      - name: Type check (tsc)
        run: bun run typecheck

      - name: Test (vitest)
        run: bun run test

  # ── Deploy to VPS ───────────────────────────────────────────

  deploy:
    runs-on: self-hosted
    needs: [changes, backend, frontend]
    if: always() && !failure() && !cancelled() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync code to deploy directory
        run: |
          sudo mkdir -p ${{ env.DEPLOY_DIR }}
          sudo rsync -a --delete \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='.venv' \
            --exclude='.git' \
            --exclude='e2e' \
            ./ ${{ env.DEPLOY_DIR }}/

      - name: Build changed images
        working-directory: ${{ env.DEPLOY_DIR }}
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
        run: |
          SERVICES=""
          if [ "${{ needs.changes.outputs.backend }}" = "true" ]; then
            SERVICES="$SERVICES backend"
          fi
          if [ "${{ needs.changes.outputs.frontend }}" = "true" ]; then
            SERVICES="$SERVICES frontend"
          fi
          if [ -n "$SERVICES" ]; then
            docker compose -f docker-compose.dokploy.yml build $SERVICES
          else
            echo "No services to build"
          fi

      - name: Scan backend image with Trivy
        if: needs.changes.outputs.backend == 'true'
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image --severity HIGH,CRITICAL --exit-code 0 \
            majlisna-backend:latest 2>/dev/null || true

      - name: Adopt orphaned containers from Dokploy
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          # Remove containers that belong to a different compose project
          # but have the same names we need. Only runs once after Dokploy handoff.
          for name in $(docker compose -f docker-compose.dokploy.yml config --services); do
            cname="majlisna-${name}"
            existing=$(docker ps -aq --filter "name=^/${cname}$" 2>/dev/null)
            if [ -n "$existing" ]; then
              project=$(docker inspect "$existing" --format '{{index .Config.Labels "com.docker.compose.project"}}' 2>/dev/null)
              if [ "$project" != "majlisna" ]; then
                echo "Removing orphaned container $cname (project: $project)"
                docker rm -f "$existing" 2>/dev/null || true
              fi
            fi
          done

      - name: Deploy all services
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose -f docker-compose.dokploy.yml up -d

      - name: Health check (backend)
        if: needs.changes.outputs.backend == 'true'
        run: |
          echo "Waiting for backend to start..."
          sleep 10
          for i in $(seq 1 6); do
            if curl -sf http://localhost:33648/health > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/6 failed, waiting 10s..."
            sleep 10
          done
          echo "Health check failed after 70s"
          exit 1

      - name: Health check (frontend)
        if: needs.changes.outputs.frontend == 'true'
        run: |
          for i in $(seq 1 6); do
            if curl -sf http://localhost:30819 > /dev/null 2>&1; then
              echo "Frontend health check passed"
              exit 0
            fi
            echo "Attempt $i/6 failed, waiting 5s..."
            sleep 5
          done
          echo "Frontend health check failed after 30s"
          exit 1

      # ── Failure diagnostics ─────────────────────────────────
      - name: Show backend logs on failure
        if: failure() && needs.changes.outputs.backend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose -f docker-compose.dokploy.yml logs --tail=50 backend

      - name: Show infrastructure logs on failure
        if: failure()
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          echo "=== PgBouncer ===" && docker compose -f docker-compose.dokploy.yml logs --tail=20 pgbouncer
          echo "=== Redis ===" && docker compose -f docker-compose.dokploy.yml logs --tail=20 redis
          echo "=== DB ===" && docker compose -f docker-compose.dokploy.yml logs --tail=20 db
          echo "=== Container status ===" && docker compose -f docker-compose.dokploy.yml ps

      - name: Show frontend logs on failure
        if: failure() && needs.changes.outputs.frontend == 'true'
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose -f docker-compose.dokploy.yml logs --tail=50 frontend

      - name: Cleanup old images
        if: always()
        run: docker image prune -f
